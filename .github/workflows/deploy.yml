name: Deploy I18N AI App
on:
  push:
    branches: [main] # Триггер при пуше в main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            # 1. Подгружаем переменные окружения NVM (чтобы система увидела node, npm и pm2)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/i18n-ai  # Путь к твоему проекту
            git pull origin main
            npm install
            npm run build
            pm2 restart i18n-site # Перезапуск процесса в PM2
